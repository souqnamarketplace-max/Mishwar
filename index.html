<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Favicon ────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- ── PWA ───────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="مِشوار" />
    <meta name="application-name" content="مِشوار" />
    <meta name="theme-color" content="#2d6a4f" />
    <meta name="color-scheme" content="light dark" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS auto-detects digit sequences as phone numbers and links them. In
         Arabic UI with Hindi/Arabic-Indic numerals this can mangle layout
         (numbers turn blue and underlined, sometimes break RTL flow). Disable
         that — the app provides explicit "اتصال" buttons where calling makes sense. -->
    <meta name="format-detection" content="telephone=no" />

    <!-- ── Fonts (hoisted out of @import for better LCP) ── -->
    <!-- Two preconnects are required: googleapis serves the CSS manifest,
         gstatic serves the woff2 files. crossorigin is required on
         gstatic per CORS rules for fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" />


    <!-- ── SEO ───────────────────────────────────── -->
    <title>مِشوار — شارك الطريق، وفر أكثر 🇵🇸</title>
    <meta name="description" content="مِشوار — منصة فلسطينية لمشاركة رحلات السيارة بين المدن. سافر بأمان، وفر المال، وتعرف على ناس جديدة. احجز رحلتك الآن من رام الله، نابلس، الخليل، بيت لحم والمزيد." />
    <meta name="keywords" content="مشاركة سيارات, رحلات فلسطين, مشوار, سفر رخيص, نقل ركاب, رام الله نابلس, كارpooling فلسطين" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="مِشوار" />
    <link rel="canonical" href="https://mishwar-nu.vercel.app/" />

    <!-- ── Open Graph ─────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mishwar-nu.vercel.app/" />
    <meta property="og:site_name" content="مِشوار" />
    <meta property="og:title" content="مِشوار — شارك الطريق، وفر أكثر 🇵🇸" />
    <meta property="og:description" content="منصة فلسطينية لمشاركة رحلات السيارة. سافر بأمان واحجز مقعدك في ثوانٍ." />
    <meta property="og:image" content="https://mishwar-nu.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ar_PS" />

    <!-- ── Twitter Card ──────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@mishwarps" />
    <meta name="twitter:title" content="مِشوار — شارك الطريق، وفر أكثر" />
    <meta name="twitter:description" content="منصة فلسطينية لمشاركة رحلات السيارة. سافر بأمان واحجز مقعدك." />
    <meta name="twitter:image" content="https://mishwar-nu.vercel.app/og-image.png" />

    <!-- ── Schema.org Structured Data ───────────── -->
    <!-- Three separate JSON-LD blocks: Google reads each independently and
         picks the one that matches the SERP feature. WebSite enables the
         sitelinks search box; Organization powers the knowledge-panel badge;
         MobileApplication powers the install prompt for branded queries. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "مِشوار",
      "alternateName": "Mishwar",
      "url": "https://mishwar-nu.vercel.app",
      "inLanguage": "ar",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://mishwar-nu.vercel.app/search?from={from_city}&to={to_city}"
        },
        "query-input": [
          "required name=from_city",
          "required name=to_city"
        ]
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "مِشوار",
      "alternateName": "Mishwar",
      "url": "https://mishwar-nu.vercel.app",
      "logo": "https://mishwar-nu.vercel.app/icon-512.png",
      "description": "منصة فلسطينية لمشاركة رحلات السيارة بين المدن",
      "areaServed": { "@type": "Country", "name": "Palestine" },
      "sameAs": [
        "https://twitter.com/mishwarps"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MobileApplication",
      "name": "مِشوار",
      "description": "منصة فلسطينية لمشاركة رحلات السيارة بين المدن",
      "url": "https://mishwar-nu.vercel.app",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "Web, iOS, Android",
      "inLanguage": "ar",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "ILS" },
      "areaServed": { "@type": "Country", "name": "Palestine" }
    }
    </script>

    <!-- ── Performance ───────────────────────────── -->
    <link rel="preconnect" href="https://dimtdwahtwaslmnuakij.supabase.co" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://unpkg.com" />

    <div id="root"></div>
