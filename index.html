<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- Pinch-to-zoom is REQUIRED for WCAG 1.4.4 (Resize Text). Removing
         user-scalable=no and maximum-scale lets users zoom up to 5x.
         Hurts neither layout (RTL Arabic Tajawal scales cleanly) nor
         iOS double-tap (interactive zones are 44px+ already). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Favicon ────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- ── PWA ───────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="مشوارو" />
    <!-- Apple Smart App Banner — Safari shows native "Open in App" strip -->
    <meta name="apple-itunes-app" content="app-id=6768105898" />
    <meta name="application-name" content="مشوارو" />
    <!-- Browser chrome / OS UI tinting. Matches brand forest-green and
         the theme_color in public/manifest.json so the chrome stays
         consistent across web, PWA, and add-to-home-screen surfaces. -->
    <meta name="theme-color" content="#1a3d2a" />
    <!-- Safari pinned-tab icon: scales the SVG to greyscale + the supplied
         color. Falls back to apple-touch-icon when not present. We use
         the same logo source; cosmetic-only, but flagged in audit L-02. -->
    <link rel="mask-icon" href="/icon-512.png" color="#1a3d2a" />
    <meta name="color-scheme" content="light dark" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS auto-detects digit sequences as phone numbers and links them. In
         Arabic UI with Hindi/Arabic-Indic numerals this can mangle layout
         (numbers turn blue and underlined, sometimes break RTL flow). Disable
         that — the app provides explicit "اتصال" buttons where calling makes sense. -->
    <meta name="format-detection" content="telephone=no" />

    <!-- ── Fonts (hoisted out of @import for better LCP) ── -->
    <!-- Two preconnects are required: googleapis serves the CSS manifest,
         gstatic serves the woff2 files. crossorigin is required on
         gstatic per CORS rules for fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" />


    <!-- ── SEO ───────────────────────────────────── -->
    <!-- The <title> below is a fallback for SPA shell rendering, robot
         crawlers that can't execute JS, and the noscript fallback. Every
         page replaces it via react-helmet-async (<SEO> component) or the
         useSEO hook, so the runtime title is per-route correct. -->
    <title>مشوارو — شارك الطريق، وفر أكثر 🇵🇸</title>
    <meta name="description" content="مشوارو — منصة فلسطينية لمشاركة رحلات السيارة بين المدن. سافر بأمان، وفر المال، وتعرف على ناس جديدة. احجز رحلتك الآن من رام الله، نابلس، الخليل، بيت لحم والمزيد." />
    <meta name="keywords" content="مشاركة سيارات, رحلات فلسطين, مشوار, سفر رخيص, نقل ركاب, رام الله نابلس, كارpooling فلسطين" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="مشوارو" />
    <!-- IMPORTANT: canonical, og:url, og:title, og:description,
         twitter:title, twitter:description are NOT statically declared
         here. They MUST be per-route. react-helmet-async (used by
         <SEO />) appends rather than replaces, so a static tag here
         would create a duplicate that Google may pick up first.
         Per-route tags are injected by:
            - <SEO path="/foo" /> for landing pages and most routes
            - useSEO({ title, description }) for legacy pages
         Both cover canonical, og:title, og:url, og:description,
         twitter:title, twitter:description. -->

    <!-- ── Open Graph (site-level defaults — overridden per route) ─── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="مشوارو" />
    <meta property="og:image" content="https://www.mishwaro.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ar_PS" />

    <!-- ── Twitter Card (site-level defaults — overridden per route) ─ -->
    <meta name="twitter:card" content="summary_large_image" />
    <!-- twitter:site is intentionally omitted until brand handle ownership
         is confirmed. Adding an unverified handle here points search-engine
         and social-card trust signals at an account that may not be ours.
         When you confirm/create the official @mishwar handle, uncomment:
         <meta name="twitter:site" content="@your_handle" />  -->
    <meta name="twitter:image" content="https://www.mishwaro.com/og-image.png" />

    <!-- ── Schema.org Structured Data ───────────── -->
    <!-- Three separate JSON-LD blocks: Google reads each independently and
         picks the one that matches the SERP feature. WebSite enables the
         sitelinks search box; Organization powers the knowledge-panel badge;
         MobileApplication powers the install prompt for branded queries. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "مشوارو",
      "alternateName": "Mishwaro",
      "url": "https://www.mishwaro.com",
      "inLanguage": "ar",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.mishwaro.com/search?from={from_city}&to={to_city}"
        },
        "query-input": [
          "required name=from_city",
          "required name=to_city"
        ]
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "مشوارو",
      "alternateName": ["Mishwaro", "Mishwar"],
      "url": "https://www.mishwaro.com",
      "logo": "https://www.mishwaro.com/icon-512.png",
      "image": "https://www.mishwaro.com/og-image.png",
      "description": "منصة فلسطينية لمشاركة رحلات السيارة بين المدن — رام الله، نابلس، الخليل، بيت لحم وغيرها",
      "slogan": "شارك الطريق، وفر أكثر",
      "areaServed": {
        "@type": "Country",
        "name": "Palestine",
        "alternateName": "فلسطين"
      },
      "knowsLanguage": ["ar", "en"],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+972-55-270-9507",
        "email": "support@mishwaro.ps",
        "contactType": "customer support",
        "availableLanguage": ["Arabic", "English"],
        "areaServed": "PS"
      },
      "sameAs": [
        "https://apps.apple.com/dz/app/mishwaro-%D9%85%D8%B4%D9%88%D8%A7%D8%B1%D9%88/id6768105898",
        "https://play.google.com/store/apps/details?id=com.mishwaro.app",
        "https://www.linkedin.com/company/mishwaro",
        "https://www.instagram.com/mishwaro.ps",
        "https://twitter.com/mishwaro_ps",
        "https://www.facebook.com/mishwaro.ps"
      ],
      "knowsAbout": [
        "Carpooling",
        "Ride sharing",
        "Palestinian transportation",
        "West Bank intercity travel",
        "مشاركة الرحلات",
        "النقل بين المدن الفلسطينية"
      ],
      "foundingDate": "2026",
      "foundingLocation": {
        "@type": "Place",
        "name": "Ramallah, Palestine"
      },
      "legalName": "Souqnin Technology Inc."
    }
    </script>

    <!-- LocalBusiness / RideSharingService — gives AI agents the strongest
         signal about what this site actually IS. TouristTrip and TaxiService
         schemas don't fit (we're not a taxi). Service with category
         "Ride sharing" plus areaServed is the canonical pattern used by
         BlaBlaCar et al. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "مشوارو — مشاركة الرحلات",
      "alternateName": "Mishwaro Ride Sharing",
      "serviceType": "Carpooling",
      "category": "Ride sharing",
      "provider": {
        "@type": "Organization",
        "name": "مشوارو",
        "url": "https://www.mishwaro.com"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Palestine"
      },
      "availableChannel": {
        "@type": "ServiceChannel",
        "serviceUrl": "https://www.mishwaro.com/search",
        "name": "Web platform"
      },
      "offers": {
        "@type": "Offer",
        "priceCurrency": "ILS",
        "priceSpecification": {
          "@type": "PriceSpecification",
          "minPrice": "10",
          "maxPrice": "100",
          "priceCurrency": "ILS"
        }
      },
      "audience": {
        "@type": "Audience",
        "geographicArea": {
          "@type": "Country",
          "name": "Palestine"
        }
      }
    }
    </script>

    <!-- FAQPage JSON-LD lives in Help.jsx (via useSEO) so it is only
         injected on /help — not on every route. Having it here AND there
         caused Google to report "2 invalid unnamed items" on /help. -->

      "supply": [{ "@type": "HowToSupply", "name": "هاتف ذكي أو متصفح" }],
      "step": [
        {
          "@type": "HowToStep",
          "position": 1,
          "name": "ابحث عن رحلة",
          "text": "افتح مشوارو وأدخل مدينة الانطلاق والوجهة والتاريخ للبحث عن الرحلات المتاحة.",
          "url": "https://www.mishwaro.com/search"
        },
        {
          "@type": "HowToStep",
          "position": 2,
          "name": "اختر سائقاً موثَّقاً",
          "text": "اطّلع على ملف السائق: تقييمه، عدد رحلاته، وتعليقات الركاب السابقين. كل سائق مر بمراجعة رخصة قيادة وتأمين مركبة.",
          "url": "https://www.mishwaro.com/search"
        },
        {
          "@type": "HowToStep",
          "position": 3,
          "name": "احجز مقعدك",
          "text": "اضغط 'احجز' واختر عدد المقاعد. السعر يظهر مسبقاً ولا توجد رسوم إضافية.",
          "url": "https://www.mishwaro.com/search"
        },
        {
          "@type": "HowToStep",
          "position": 4,
          "name": "تواصل مع السائق وادفع",
          "text": "راسل السائق داخل التطبيق لتحديد نقطة الالتقاء. الدفع بينك وبين السائق مباشرة (نقداً، جوال باي، Reflect، أو تحويل بنكي).",
          "url": "https://www.mishwaro.com/how-it-works"
        }
      ]

    </script>

    <!-- ── Performance ───────────────────────────── -->
    <link rel="preconnect" href="https://dimtdwahtwaslmnuakij.supabase.co" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://unpkg.com" />
    <!-- Hero slideshow images load from Unsplash (admin-uploaded slide
         URLs are typically Unsplash links). Preconnect early so the TLS
         handshake is done by the time React resolves which slide to show.

         No <link rel="preload"> for the first-slide image — admin-
         uploaded slides come from Supabase and can't be preloaded
         statically. We previously preloaded CITY_SLIDES[0] (the Dome
         of the Rock fallback), but once admins populated their own
         hero_city_slides that preload became wasted bandwidth — the
         browser fetched a 248kB image users never saw. The mobile
         hero's <img> tag uses fetchpriority="high" + loading="eager"
         already (HeroSection.jsx line 174-177), which gets us most of
         the LCP benefit for the actual displayed slide. -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
