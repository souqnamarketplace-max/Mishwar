name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        # --omit=optional skips sharp (pulled in by @vercel/og) which requires
        # native libvips binaries unavailable in GitHub Actions CI.
        # sharp is only used in the Node.js fallback of api/og-trip.js;
        # production uses Vercel Edge runtime (@vercel/og directly, no sharp).
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint
        # Lint is non-fatal for now — the codebase has known unused-var
        # warnings that aren't worth blocking on. Switch to `npm run lint`
        # without continue-on-error once those are cleaned up.
        continue-on-error: true

      - name: Build
        # Build IS fatal — anything that breaks the bundle should never reach main.
        run: npm run build
        env:
          # Build needs these to construct env-conditional code paths;
          # actual values come from Vercel at deploy time.
          VITE_SUPABASE_URL: https://placeholder-for-ci.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder

      - name: Verify console statements stripped from production
        # Audit M-05: vite.config.js drops console/debugger when
        # NODE_ENV=production. Vendor bundles legitimately contain the
        # word "console" inside library source (Supabase debug logger
        # references, etc.) so we only scan our own first-party chunks.
        #
        # Regex notes:
        #   We grep for `console.<ident>(` only — i.e. an actual
        #   invocation. esbuild's drop:console strips invocations and
        #   replaces them with `void 0`, but it leaves untouched any
        #   non-call references such as:
        #     - type-checks: `typeof console.warn === "function"`
        #     - capability refs: `console.error || fallback`
        #     - method references: `const log = console.log;`
        #     - property paths: `globalThis.console.error`
        #   These all survive minification but never execute a log.
        #   Some libraries (e.g. react-helmet-async) ship feature-
        #   detection code like
        #     (msg) => console && typeof console.warn === "function" && console.warn(msg)
        #   The trailing call gets stripped, but the typeof check
        #   remains. Without the trailing-paren requirement we'd false-
        #   positive on that residue. With it, we catch only actual
        #   calls — which is what `drop:console` is meant to remove
        #   anyway, and what we actually care about.
        #
        # Pattern: (?<![.\w])console\.\w+\s*\(
        #   - negative lookbehind excludes `e.console`, `_console`, etc.
        #     so we don't fire on minified library locals.
        #   - `\w+\s*\(` requires a method name followed by `(`, which
        #     only an actual invocation has.
        run: |
          set -e
          our_files=$(find dist/assets -name '*.js' \
            ! -name 'vendor-*' \
            ! -name 'recharts*' \
            ! -name 'leaflet*')
          if [ -z "$our_files" ]; then
            echo "::warning::no first-party bundles found to scan"
            exit 0
          fi
          if grep -nHP '(?<![.\w])console\.\w+\s*\(' $our_files > /tmp/leaked.txt; then
            echo "::error::console.* invocations found in first-party production bundle:"
            cat /tmp/leaked.txt
            exit 1
          fi
          echo "OK — no console.* invocations in first-party bundles"

      - name: Verify no hardcoded credentials
        # Audit H-02: anon key fallbacks were a foot-gun. Block them at CI.
        run: |
          if grep -rn 'sb_publishable_\|sb_secret_\|service_role' \
               --include='*.js' --include='*.jsx' --include='*.ts' --include='*.tsx' \
               --include='*.md' --include='*.json' \
               api/ src/ 2>/dev/null; then
            echo "::error::hardcoded Supabase credentials found"
            exit 1
          fi
