name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint
        # Lint is non-fatal for now — the codebase has known unused-var
        # warnings that aren't worth blocking on. Switch to `npm run lint`
        # without continue-on-error once those are cleaned up.
        continue-on-error: true

      - name: Build
        # Build IS fatal — anything that breaks the bundle should never reach main.
        run: npm run build
        env:
          # Build needs these to construct env-conditional code paths;
          # actual values come from Vercel at deploy time.
          VITE_SUPABASE_URL: https://placeholder-for-ci.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder

      - name: Verify console statements stripped from production
        # Audit M-05: vite.config.js drops console/debugger when
        # NODE_ENV=production. Vendor bundles legitimately contain the
        # word "console" inside library source (Supabase debug logger
        # references, etc.) so we only scan our own first-party chunks.
        run: |
          set -e
          # Find dist files that are NOT vendor-* and NOT third-party-named
          our_files=$(find dist/assets -name '*.js' \
            ! -name 'vendor-*' \
            ! -name 'recharts*' \
            ! -name 'leaflet*')
          if [ -z "$our_files" ]; then
            echo "::warning::no first-party bundles found to scan"
            exit 0
          fi
          if grep -nH 'console\.' $our_files > /tmp/leaked.txt; then
            echo "::error::console.* statements found in first-party production bundle:"
            cat /tmp/leaked.txt
            exit 1
          fi
          echo "OK — no console.* in first-party bundles"

      - name: Verify no hardcoded credentials
        # Audit H-02: anon key fallbacks were a foot-gun. Block them at CI.
        run: |
          if grep -rn 'sb_publishable_\|sb_secret_\|service_role' \
               --include='*.js' --include='*.jsx' --include='*.ts' --include='*.tsx' \
               --include='*.md' --include='*.json' \
               api/ src/ 2>/dev/null; then
            echo "::error::hardcoded Supabase credentials found"
            exit 1
          fi
